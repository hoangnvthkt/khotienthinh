<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhoViet - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #f0fdf4, #f1f5f9, #f0fdfa);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: #064e3b;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: linear-gradient(135deg, #10b981, #064e3b);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(6, 78, 59, 0.3);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(6, 78, 59, 0.4);
    }
    .status {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .status span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏗️</div>
    <h1>Không có kết nối</h1>
    <p>Bạn đang offline. Vui lòng kiểm tra kết nối mạng và thử lại.</p>
    <button onclick="window.location.reload()">Thử lại</button>
    <div class="status"><span></span>Offline</div>
  </div>
</body>
</html>
