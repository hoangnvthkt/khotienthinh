<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KhoViet - Hệ thống quản lý kho thông minh cho doanh nghiệp xây dựng">
  <title>KhoViet - Hệ thống Quản Lý Kho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: '#0f172a',
            secondary: '#334155',
            accent: '#2563eb',
            danger: '#dc2626',
            success: '#16a34a',
            warning: '#ca8a04',
          },
          keyframes: {
            shrink: {
              '0%': { width: '100%' },
              '100%': { width: '0%' },
            },
            fadeInDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideInRight: {
              '0%': { opacity: '0', transform: 'translateX(100%)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200px 0' },
              '100%': { backgroundPosition: 'calc(200px + 100%) 0' },
            },
            pulse: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.5' },
            },
          },
          animation: {
            shrink: 'shrink var(--dur) linear forwards',
            'fade-in-down': 'fadeInDown 0.3s ease-out',
            'slide-in-right': 'slideInRight 0.35s ease-out',
            shimmer: 'shimmer 1.5s infinite linear',
          },
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {

    "lucide-react": "https://esm.sh/lucide-react@0.462.0?external=react",
    "recharts": "https://esm.sh/recharts@2.12.2?external=react,react-dom",
    "xlsx": "https://esm.sh/xlsx@0.18.5"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
  <style>

        background: white !important;

      }

      table {
        width: 100% !important;
        border-collapse: collapse !important;
      }

      th,
      td {
        border: 1px solid #ddd !important;
        padding: 8px !important;

        font-size: 10pt !important;
      }

      h1,
      h2,
      h3 {
        color: black !important;
        margin-bottom: 10px !important;
      }

      @page {
        size: auto;
        margin: 15mm;
      }
    }
  </style>
</head>
