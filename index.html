<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KhoViet - Hệ thống quản lý kho thông minh cho doanh nghiệp xây dựng">
  <title>KhoViet - Hệ thống Quản Lý Kho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            // Tông xanh Emerald chủ đạo
            primary: '#064e3b',   // emerald-900 
            secondary: '#0f766e', // teal-700
            accent: '#10b981',    // emerald-500
            success: '#059669',   // emerald-600
            danger: '#dc2626',
            warning: '#f59e0b',
          },
          keyframes: {
            shrink: {
              '0%': { width: '100%' },
              '100%': { width: '0%' },
            },
            fadeInDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideInRight: {
              '0%': { opacity: '0', transform: 'translateX(100%)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200px 0' },
              '100%': { backgroundPosition: 'calc(200px + 100%) 0' },
            },
            pulse: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.5' },
            },
          },
          animation: {
            shrink: 'shrink var(--dur) linear forwards',
            'fade-in-down': 'fadeInDown 0.3s ease-out',
            'slide-in-right': 'slideInRight 0.35s ease-out',
            shimmer: 'shimmer 1.5s infinite linear',
          },
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",

    "recharts": "https://esm.sh/recharts@2.12.2?external=react,react-dom",
    "xlsx": "https://esm.sh/xlsx@0.18.5"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
  <style>
    @media print {

      .no-print,
      nav,
      aside,
      button,
      .toast-container {
        display: none !important;
      }

      body {
        background: white !important;
        color: black !important;
        margin: 0;
        padding: 0;
      }

      .print-only {
        display: block !important;
      }

      main {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
      }

      .card,
      .bg-white,
      .dark\:bg-slate-800 {
        border: none !important;
        box-shadow: none !important;
        background: transparent !important;
      }

      table {
        width: 100% !important;
        border-collapse: collapse !important;
      }

      th,
      td {
        border: 1px solid #ddd !important;
        padding: 8px !important;
        text-align: left !important;
        font-size: 10pt !important;
      }

      h1,
      h2,
      h3 {
        color: black !important;
        margin-bottom: 10px !important;
      }

      @page {
        size: auto;
        margin: 15mm;
      }
    }

    /* Các Utility Classes tĩnh dùng chung cho Theme Glassmorphism */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }

    .dark .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px 0 rgba(16, 185, 129, 0.05);
      /* Bóng xanh nhẹ */
    }

    .dark .glass-card {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }
  </style>
